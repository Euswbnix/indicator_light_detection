# YOLOv8s-P2 单类检测器（indicator_light）
# 在标准 YOLOv8 基础上增加 P2(1/4) 检测头，专攻小目标（仪表盘小灯 15-40px）。
# 检测头：P2/P3/P4/P5 四个尺度，覆盖从密集小灯到中央大图标的尺度跨度。
nc: 1                 # 单类：有没有灯
scales:               # 's' 规模
  s: [0.33, 0.50, 1024]

backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv, [64, 3, 2]]    # 0-P1/2
  - [-1, 1, Conv, [128, 3, 2]]   # 1-P2/4
  - [-1, 3, C2f, [128, True]]    # 2
  - [-1, 1, Conv, [256, 3, 2]]   # 3-P3/8
  - [-1, 6, C2f, [256, True]]    # 4
  - [-1, 1, Conv, [512, 3, 2]]   # 5-P4/16
  - [-1, 6, C2f, [512, True]]    # 6
  - [-1, 1, Conv, [1024, 3, 2]]  # 7-P5/32
  - [-1, 3, C2f, [1024, True]]   # 8
  - [-1, 1, SPPF, [1024, 5]]     # 9

head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]   # 10
  - [[-1, 6], 1, Concat, [1]]                     # 11 cat P4
  - [-1, 3, C2f, [512]]                           # 12

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]   # 13
  - [[-1, 4], 1, Concat, [1]]                     # 14 cat P3
  - [-1, 3, C2f, [256]]                           # 15 (P3/8)

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]   # 16
  - [[-1, 2], 1, Concat, [1]]                     # 17 cat P2
  - [-1, 3, C2f, [128]]                           # 18 (P2/4) <-- 小目标头

  - [-1, 1, Conv, [128, 3, 2]]                    # 19
  - [[-1, 15], 1, Concat, [1]]                    # 20
  - [-1, 3, C2f, [256]]                           # 21 (P3/8)

  - [-1, 1, Conv, [256, 3, 2]]                    # 22
  - [[-1, 12], 1, Concat, [1]]                    # 23
  - [-1, 3, C2f, [512]]                           # 24 (P4/16)

  - [-1, 1, Conv, [512, 3, 2]]                    # 25
  - [[-1, 9], 1, Concat, [1]]                     # 26
  - [-1, 3, C2f, [1024]]                          # 27 (P5/32)

  - [[18, 21, 24, 27], 1, Detect, [nc]]           # Detect(P2, P3, P4, P5)
